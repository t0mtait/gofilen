name: Release

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/gofilen_linux_amd64   .
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/gofilen_linux_arm64   .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/gofilen_darwin_amd64  .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/gofilen_darwin_arm64  .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/gofilen_windows_amd64.exe .

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
